            padding: 5px;

// ==================== PERSISTENCE ====================
const STORAGE_KEY = 'wildpulse_collected_creatures';
let collectedCreatures = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function saveCollected(creature) {
    if (!collectedCreatures.find(c => c.id === creature.id)) {
        collectedCreatures.push(creature);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collectedCreatures));
    }
}

// ==================== BREEDING ====================
window.breed = function(parent1, parent2) {
    const p1Prefix = parent1.name.substring(0, Math.ceil(parent1.name.length / 2));
    const p2Suffix = parent2.name.substring(Math.floor(parent2.name.length / 2));
    const childName = p1Prefix + p2Suffix;

    const childDesc = `A hybrid of ${parent1.name} and ${parent2.name}. ${parent1.description} Blended with: ${parent2.description}`;

    const combinedFeatures = [...parent1.features, ...parent2.features];
    const childFeatures = Array.from(new Set(combinedFeatures));

    const childType = (parent1.type === parent2.type) ? parent1.type : `${parent1.type}-${parent2.type}`;

    const childStats = {
        health: Math.floor((parent1.stats.health + parent2.stats.health) / 2),
        attack: Math.floor((parent1.stats.attack + parent2.stats.attack) / 2)
    };

    const childGeneration = Math.max(parent1.generation, parent2.generation) + 1;

    // Unique ID combining parent IDs and timestamp to avoid collisions
    const childId = `gen${childGeneration}_${parent1.id}_${parent2.id}_${Date.now()}`;

    // Blend colors simply by averaging RGB
    const c1 = parent1.color;
    const c2 = parent2.color;
    const r = Math.floor((((c1 >> 16) & 0xFF) + ((c2 >> 16) & 0xFF)) / 2);
    const g = Math.floor((((c1 >> 8) & 0xFF) + ((c2 >> 8) & 0xFF)) / 2);
    const b = Math.floor(((c1 & 0xFF) + (c2 & 0xFF)) / 2);
    const childColor = (r << 16) | (g << 8) | b;

    return {
        id: childId,
        name: childName,
        description: childDesc,
        features: childFeatures,
        type: childType,
        stats: childStats,
        generation: childGeneration,
        color: childColor
    };
};

function populateSelect(selectElement) {
    selectElement.innerHTML = '';
    collectedCreatures.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.text = `${c.name} (Gen ${c.generation})`;
        selectElement.appendChild(option);
    });
}

window.openBreedingModal = function() {
    document.getElementById('breedingModal').style.display = 'block';
    const s1 = document.getElementById('parent1Select');
    const s2 = document.getElementById('parent2Select');
    populateSelect(s1);
    populateSelect(s2);
    document.getElementById('breedResult').innerText = '';
};

window.closeBreedingModal = function() {
    document.getElementById('breedingModal').style.display = 'none';
};

window.doBreed = function() {
    const id1 = document.getElementById('parent1Select').value;
    const id2 = document.getElementById('parent2Select').value;

    if (!id1 || !id2) {
        document.getElementById('breedResult').innerText = 'Please collect and select two parents.';
        return;
    }

    if (id1 === id2) {
        document.getElementById('breedResult').innerText = 'Cannot breed a creature with itself.';
        return;
    }

    const p1Index = collectedCreatures.findIndex(c => String(c.id) === String(id1));
    const p2Index = collectedCreatures.findIndex(c => String(c.id) === String(id2));

    if (p1Index !== -1 && p2Index !== -1) {
        const p1 = collectedCreatures[p1Index];
        const p2 = collectedCreatures[p2Index];

        const child = window.breed(p1, p2);

        // Remove parents temporarily to simulate them returning to the wild or being consumed by breeding
        // Make sure to remove the higher index first to avoid shifting issues
        if (p1Index > p2Index) {
            collectedCreatures.splice(p1Index, 1);
            collectedCreatures.splice(p2Index, 1);
        } else {
            collectedCreatures.splice(p2Index, 1);
            collectedCreatures.splice(p1Index, 1);
        }

        // Save state after removing parents
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collectedCreatures));

        // Add the child
        saveCollected(child);

        // Update UI Text if it exists
        if (typeof uiText !== 'undefined' && uiText) {
            uiText.setText(`Collected: ${collectedCreatures.length} / 50`);
        }

        document.getElementById('breedResult').innerText = `Successfully bred ${child.name} (Gen ${child.generation})! The parents have returned to the wild.`;

        // Re-populate to show new child and removed parents
        populateSelect(document.getElementById('parent1Select'));
        populateSelect(document.getElementById('parent2Select'));
    }
};

// ==================== PHASER GAME ====================
const WORLD_SIZE = 6000;

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: {
        default: 'arcade',
        arcade: { debug: false }
    },
    scene: { preload: preload, create: create, update: update },
    scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH
    }
};

const game = new Phaser.Game(config);

let player;
let cursors;
let pointerTarget = null;
let creaturesGroup;
let uiText;
let popupText;
let popupBackground;
let popupTimer;
let bgGrass;

function preload() {
    // Pre-generate grass blades so they remain consistent across frames
    const blades = [];
    for (let i = 0; i < 20; i++) {
        blades.push({
            x: Math.random() * 64,
            y: Math.random() * 64,
            color: Math.random() > 0.5 ? '#006400' : '#32CD32'
        });
    }

    // Generate procedural animated grass background frames
    const numFrames = 4;
    for (let frame = 0; frame < numFrames; frame++) {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#228B22'; // ForestGreen
        ctx.fillRect(0, 0, 64, 64);

        // Calculate offset for waving effect
        const offsetX = Math.round(Math.sin(frame * (Math.PI / 2)) * 2);

        // Add details to the grass
        for (let i = 0; i < blades.length; i++) {
            ctx.fillStyle = blades[i].color;
            const drawX = (blades[i].x + offsetX + 64) % 64;
            ctx.fillRect(drawX, blades[i].y, 2, 8);
            if (drawX > 62) {
                ctx.fillRect(drawX - 64, blades[i].y, 2, 8);
            }
        }

        this.textures.addCanvas('grass_' + frame, canvas);
    }
}

function create() {
    // Background repeating tile
    bgGrass = this.add.tileSprite(0, 0, WORLD_SIZE, WORLD_SIZE, 'grass_0').setOrigin(0, 0);

    // Player setup
    player = this.add.rectangle(WORLD_SIZE / 2, WORLD_SIZE / 2, 40, 40, 0xFFFFFF);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);

    this.physics.world.setBounds(0, 0, WORLD_SIZE, WORLD_SIZE);
    this.cameras.main.setBounds(0, 0, WORLD_SIZE, WORLD_SIZE);
    this.cameras.main.startFollow(player);

    // UI Layer
    uiText = this.add.text(20, 20, `Collected: ${collectedCreatures.length} / 50`, {
        fontSize: '24px',
        fill: '#FFF',
        backgroundColor: '#000000',
        padding: {x: 10, y: 10}
    }).setScrollFactor(0);

    // Popup Layer
    popupBackground = this.add.rectangle(window.innerWidth / 2, window.innerHeight - 100, 600, 150, 0x000000, 0.8)
        .setScrollFactor(0)
        .setOrigin(0.5);
    popupText = this.add.text(window.innerWidth / 2, window.innerHeight - 100, "", {
        fontSize: '18px',
        fill: '#FFF',
        align: 'center',
        wordWrap: { width: 560 }
    }).setScrollFactor(0).setOrigin(0.5);

    popupBackground.setVisible(false);
    popupText.setVisible(false);

    // Controls
    cursors = this.input.keyboard.createCursorKeys();

    this.input.on('pointerdown', (pointer) => {
        pointerTarget = { x: pointer.worldX, y: pointer.worldY };
    });

    this.input.on('pointermove', (pointer) => {
        if (pointer.isDown) {
            pointerTarget = { x: pointer.worldX, y: pointer.worldY };
        }
    });

    this.input.on('pointerup', () => {
        pointerTarget = null;
    });

    // Resize handling for popup
    this.scale.on('resize', (gameSize) => {
        popupBackground.setPosition(gameSize.width / 2, gameSize.height - 100);
        popupText.setPosition(gameSize.width / 2, gameSize.height - 100);
    });

    // Creatures setup
    creaturesGroup = this.physics.add.group();

    // Spawn exactly the 50 base creatures
    for (let i = 0; i < baseCreatures.length; i++) {
        spawnCreature(this, baseCreatures[i]);
    }

    // Overlap physics
    this.physics.add.overlap(player, creaturesGroup, collectCreature, null, this);
}

function spawnCreature(scene, creatureData) {
    const x = Phaser.Math.Between(100, WORLD_SIZE - 100);
    const y = Phaser.Math.Between(100, WORLD_SIZE - 100);

    const sprite = scene.add.rectangle(x, y, 30, 30, creatureData.color);
    scene.physics.add.existing(sprite);
    sprite.setData('creatureData', creatureData);
    creaturesGroup.add(sprite);
}

function collectCreature(player, creatureSprite) {
    const data = creatureSprite.getData('creatureData');

    // Save full object
    saveCollected(data);

    // Update UI
    uiText.setText(`Collected: ${collectedCreatures.length} / 50`);

    // Show Popup
    if (popupTimer) popupTimer.remove();

    popupText.setText(`${data.name}\n\n${data.description || data.desc}`);
    popupBackground.setVisible(true);
    popupText.setVisible(true);

    popupTimer = this.time.delayedCall(3000, () => {
        popupBackground.setVisible(false);
        popupText.setVisible(false);
    });

    // Despawn
    creatureSprite.destroy();

    // Respawn an exact copy of the creature immediately to keep the 50 in world
    spawnCreature(this, data);
}

function update() {
    const speed = 400;

    // Animate background
    const frame = Math.floor(this.time.now / 300) % 4;
    bgGrass.setTexture('grass_' + frame);

    player.body.setVelocity(0);

    // Keyboard movement
    let movedX = false;
    let movedY = false;

    if (cursors.left.isDown) {
        player.body.setVelocityX(-speed);
        movedX = true;
    } else if (cursors.right.isDown) {
        player.body.setVelocityX(speed);
        movedX = true;
    }

    if (cursors.up.isDown) {
        player.body.setVelocityY(-speed);
        movedY = true;
    } else if (cursors.down.isDown) {
        player.body.setVelocityY(speed);
        movedY = true;
    }

    // Pointer movement (if active and overriding keyboard or not moving via keyboard)
    if (pointerTarget) {
        const dx = pointerTarget.x - player.x;
        const dy = pointerTarget.y - player.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 10) {
            player.body.setVelocity((dx / distance) * speed, (dy / distance) * speed);
        } else {
            // Reached target
            player.body.setVelocity(0);
        }
    } else if (!movedX && !movedY) {
        player.body.setVelocity(0);
    }
}
</script>
