        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #breedBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            z-index: 100;
        }
        #breedingModal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border: 2px solid white;
            z-index: 200;
            text-align: center;
        }
        #breedingModal select, #breedingModal button {
            margin: 10px;
            padding: 5px;
            font-size: 16px;
        }

        #menuBtn {
            position: absolute;
            top: 20px;
            right: 200px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
            z-index: 100;
        }
        #menuModal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border: 2px solid white;
            z-index: 200;
            text-align: center;
        }
        #menuModal button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
        }
        #partyModal {
            display: none;
            position: absolute;
            top: 10%;
            left: 10%;
            right: 10%;
            bottom: 10%;
            background-color: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 20px;
            border: 2px solid white;
            z-index: 300;
            overflow-y: auto;
        }
        .party-card {
            border: 1px solid #555;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222;
        }
        .party-controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .party-controls button {
            padding: 5px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<button id="menuBtn" onclick="openMenuModal()">Menu</button>
<div id="menuModal">
    <h2>Menu</h2>
    <button onclick="openPartyModal()">Party</button>
    <button onclick="deleteProgress()">Delete Progress</button>
    <button onclick="closeMenuModal()">Close</button>
</div>
<div id="partyModal">
    <h2>Party</h2>
    <div id="partyList"></div>
    <button onclick="closePartyModal()">Close</button>
</div>

<button id="breedBtn" onclick="openBreedingModal()">Breeding Center</button>
<div id="breedingModal">
    <h2>Breeding Center</h2>
    <div>
        <label>Parent 1:</label>

    </div>
    <button onclick="doBreed()">Breed!</button>
    <button onclick="closeBreedingModal()">Close</button>
    <p id="breedResult"></p>
</div>

window.getRandomNature = function() {
    return window.natures[Math.floor(Math.random() * window.natures.length)];

window.getEffectiveStat = function(creature, statName) {
    let base = creature.stats[statName] || 50; // Fallback
    if (!creature.nature) return base;
    if (creature.nature.increase === statName) return base * 1.1;
    if (creature.nature.decrease === statName) return base * 0.9;
    return base;
};

window.getTypeModifier = function(attackType, defenseType) {
    // If complex type (e.g. Fire-Water)
    if (defenseType.includes('-')) {
        let types = defenseType.split('-');
        let mod1 = (window.typeChart[attackType] && window.typeChart[attackType][types[0]] !== undefined) ? window.typeChart[attackType][types[0]] : 1;
        let mod2 = (window.typeChart[attackType] && window.typeChart[attackType][types[1]] !== undefined) ? window.typeChart[attackType][types[1]] : 1;
        return mod1 * mod2;
    }
    if (window.typeChart[attackType] && window.typeChart[attackType][defenseType] !== undefined) {
        return window.typeChart[attackType][defenseType];
    }
    return 1;
};

window.calculateDamage = function(attacker, defender, power = 50) {
    const atk = window.getEffectiveStat(attacker, 'attack');
    const def = window.getEffectiveStat(defender, 'defense');
    const typeMod = window.getTypeModifier(attacker.type, defender.type);
    const damage = (atk / def) * power * typeMod;
    return damage;
};

            let base = c.stats[stat] || 50;

            return `<div>${stat}: ${base} <span style="color:${color}">(Eff: ${eff})</span></div>`;

    if (index > 0) {
        let temp = collectedCreatures[index];
        collectedCreatures[index] = collectedCreatures[index - 1];
        collectedCreatures[index - 1] = temp;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collectedCreatures));
        renderPartyList();

window.moveDown = function(index) {
    if (index < collectedCreatures.length - 1) {

        collectedCreatures[index] = collectedCreatures[index + 1];
        collectedCreatures[index + 1] = temp;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collectedCreatures));

    }

// ==================== BREEDING ====================
window.breed = function(parent1, parent2) {
    let p1Prefix = parent1.name.substring(0, Math.ceil(parent1.name.length / 2));
    let p2Suffix = parent2.name.substring(Math.floor(parent2.name.length / 2));
    let childName = p1Prefix + p2Suffix;

    // Prevent duplicate names
    if (childName === parent1.name || childName === parent2.name) {
        childName = parent1.name.substring(0, 3) + parent2.name.substring(parent2.name.length - 3);
    }

    const childDesc = `A unique hybrid born from the union of ${parent1.name} and ${parent2.name}. It inherits the best traits of its ${parent1.type} and ${parent2.type} ancestors, possessing a blend of their distinct features.`;

    const combinedFeatures = [...parent1.features, ...parent2.features];

    // Shuffle and pick a random subset to avoid feature bloat
    const uniqueFeatures = Array.from(new Set(combinedFeatures)).sort(() => 0.5 - Math.random());
    const childFeatures = uniqueFeatures.slice(0, Math.min(4, Math.max(2, Math.floor(uniqueFeatures.length / 2))));

    const childType = (parent1.type === parent2.type) ? parent1.type : `${parent1.type}-${parent2.type}`;

    const childStats = {
        health: Math.floor((parent1.stats.health + parent2.stats.health) / 2),
        attack: Math.floor((parent1.stats.attack + parent2.stats.attack) / 2),
        defense: Math.floor(((parent1.stats.defense || 50) + (parent2.stats.defense || 50)) / 2),
        speed: Math.floor(((parent1.stats.speed || 50) + (parent2.stats.speed || 50)) / 2),
        specialAttack: Math.floor(((parent1.stats.specialAttack || 50) + (parent2.stats.specialAttack || 50)) / 2),
        specialDefense: Math.floor(((parent1.stats.specialDefense || 50) + (parent2.stats.specialDefense || 50)) / 2)
    };

    const childGeneration = Math.max(parent1.generation, parent2.generation) + 1;

    // Unique ID combining parent IDs and timestamp to avoid collisions
    const childId = `gen${childGeneration}_${parent1.id}_${parent2.id}_${Date.now()}`;

    // Blend colors simply by averaging RGB
    const c1 = parent1.color;
    const c2 = parent2.color;
    const r = Math.floor((((c1 >> 16) & 0xFF) + ((c2 >> 16) & 0xFF)) / 2);
    const g = Math.floor((((c1 >> 8) & 0xFF) + ((c2 >> 8) & 0xFF)) / 2);
    const b = Math.floor(((c1 & 0xFF) + (c2 & 0xFF)) / 2);
    const childColor = (r << 16) | (g << 8) | b;

    return {
        id: childId,
        name: childName,
        description: childDesc,
        features: childFeatures,
        type: childType,
        stats: childStats,
        generation: childGeneration,
        color: childColor,
        nature: window.getRandomNature(),
        parents: {
            name1: parent1.name,
            type1: parent1.type,
            name2: parent2.name,
            type2: parent2.type
        }
    };
};

function populateSelect(selectElement) {
    selectElement.innerHTML = '';

        selectElement.appendChild(option);
    });
}

    const s1 = document.getElementById('parent1Select');
    const s2 = document.getElementById('parent2Select');
    populateSelect(s1);
    populateSelect(s2);
    document.getElementById('breedResult').innerText = '';
};

window.closeBreedingModal = function() {
    document.getElementById('breedingModal').style.display = 'none';
};

window.doBreed = function() {
    const id1 = document.getElementById('parent1Select').value;
    const id2 = document.getElementById('parent2Select').value;

    if (!id1 || !id2) {
        document.getElementById('breedResult').innerText = 'Please collect and select two parents.';
        return;
    }

    if (id1 === id2) {
        document.getElementById('breedResult').innerText = 'Cannot breed a creature with itself.';
        return;
    }

    const p1Index = collectedCreatures.findIndex(c => String(c.id) === String(id1));
    const p2Index = collectedCreatures.findIndex(c => String(c.id) === String(id2));

    if (p1Index !== -1 && p2Index !== -1) {
        const p1 = collectedCreatures[p1Index];
        const p2 = collectedCreatures[p2Index];

        // Ensure compatibility - either same type, or based on typeChart if they are somewhat compatible
        // Let's use the type modifier. If it's 0, they can't breed.
        const compatibility = window.getTypeModifier(p1.type, p2.type);
        if (compatibility === 0) {
             document.getElementById('breedResult').innerText = `Incompatible types: ${p1.type} cannot breed with ${p2.type}.`;
             return;
        }

        const child = window.breed(p1, p2);

        // Remove parents temporarily to simulate them returning to the wild or being consumed by breeding
        // Make sure to remove the higher index first to avoid shifting issues
        if (p1Index > p2Index) {
            collectedCreatures.splice(p1Index, 1);
            collectedCreatures.splice(p2Index, 1);
        } else {
            collectedCreatures.splice(p2Index, 1);
            collectedCreatures.splice(p1Index, 1);
        }

        // Save state after removing parents
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collectedCreatures));

        // Add the child
        saveCollected(child);

        // Update UI Text if it exists
        if (typeof uiText !== 'undefined' && uiText) {
            uiText.setText(`Collected: ${collectedCreatures.length} / 50`);
        }

        document.getElementById('breedResult').innerText = `Successfully bred ${child.name} (Gen ${child.generation})! The parents have returned to the wild.`;

        // Re-populate to show new child and removed parents
        populateSelect(document.getElementById('parent1Select'));
        populateSelect(document.getElementById('parent2Select'));
    }
};

        blades.push({
            x: Math.random() * 64,
            y: Math.random() * 64,
            color: Math.random() > 0.5 ? '#006400' : '#32CD32'
        });
    }

    // Generate procedural animated grass background frames
    const numFrames = 4;
    for (let frame = 0; frame < numFrames; frame++) {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#228B22'; // ForestGreen
        ctx.fillRect(0, 0, 64, 64);

        // Calculate offset for waving effect
        const offsetX = Math.round(Math.sin(frame * (Math.PI / 2)) * 2);

        // Add details to the grass
        for (let i = 0; i < blades.length; i++) {
            ctx.fillStyle = blades[i].color;
            const drawX = (blades[i].x + offsetX + 64) % 64;
            ctx.fillRect(drawX, blades[i].y, 2, 8);
            if (drawX > 62) {
                ctx.fillRect(drawX - 64, blades[i].y, 2, 8);
            }
        }

        this.textures.addCanvas('grass_' + frame, canvas);
    }
}

function create() {
    // Background repeating tile
    bgGrass = this.add.tileSprite(0, 0, WORLD_SIZE, WORLD_SIZE, 'grass_0').setOrigin(0, 0);

    // Player setup
    player = this.add.rectangle(WORLD_SIZE / 2, WORLD_SIZE / 2, 40, 40, 0xFFFFFF);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);

    this.physics.world.setBounds(0, 0, WORLD_SIZE, WORLD_SIZE);
    this.cameras.main.setBounds(0, 0, WORLD_SIZE, WORLD_SIZE);
    this.cameras.main.startFollow(player);

    // UI Layer
    uiText = this.add.text(20, 20, `Collected: ${collectedCreatures.length} / 50`, {
        fontSize: '24px',
        fill: '#FFF',
        backgroundColor: '#000000',
        padding: {x: 10, y: 10}
    }).setScrollFactor(0);

    // Popup Layer
    popupBackground = this.add.rectangle(window.innerWidth / 2, window.innerHeight - 100, 600, 150, 0x000000, 0.8)
        .setScrollFactor(0)
        .setOrigin(0.5);
    popupText = this.add.text(window.innerWidth / 2, window.innerHeight - 100, "", {
        fontSize: '18px',
        fill: '#FFF',
        align: 'center',
        wordWrap: { width: 560 }
    }).setScrollFactor(0).setOrigin(0.5);

    popupBackground.setVisible(false);
    popupText.setVisible(false);

    // Controls
    cursors = this.input.keyboard.createCursorKeys();

    this.input.on('pointerdown', (pointer) => {
        pointerTarget = { x: pointer.worldX, y: pointer.worldY };
    });

    this.input.on('pointermove', (pointer) => {
        if (pointer.isDown) {
            pointerTarget = { x: pointer.worldX, y: pointer.worldY };
        }
    });

    this.input.on('pointerup', () => {
        pointerTarget = null;
    });

    // Resize handling for popup
    this.scale.on('resize', (gameSize) => {
        popupBackground.setPosition(gameSize.width / 2, gameSize.height - 100);
        popupText.setPosition(gameSize.width / 2, gameSize.height - 100);
    });

    // Creatures setup
    creaturesGroup = this.physics.add.group();

    // Spawn exactly the 50 base creatures
    for (let i = 0; i < baseCreatures.length; i++) {
        spawnCreature(this, baseCreatures[i]);
    }

    // Overlap physics
    this.physics.add.overlap(player, creaturesGroup, collectCreature, null, this);
}

function spawnCreature(scene, creatureData) {
    const x = Phaser.Math.Between(100, WORLD_SIZE - 100);
    const y = Phaser.Math.Between(100, WORLD_SIZE - 100);

    const sprite = scene.add.rectangle(x, y, 30, 30, creatureData.color);
    scene.physics.add.existing(sprite);
    sprite.setData('creatureData', creatureData);
    creaturesGroup.add(sprite);
}

function collectCreature(player, creatureSprite) {
    // Clone data to avoid mutating base prototype directly in group
    const data = JSON.parse(JSON.stringify(creatureSprite.getData('creatureData')));

    // Assign nature if it doesn't have one
    if (!data.nature) data.nature = window.getRandomNature();

    let battleText = "";
    if (collectedCreatures.length > 0) {
        const leadCreature = collectedCreatures[0];
        const damage = window.calculateDamage(leadCreature, data, 50);
        battleText = `Your ${leadCreature.name} dealt ${damage.toFixed(2)} damage to ${data.name}!\n\n`;
    }

    // Save full object
    saveCollected(data);

    // Update UI
    uiText.setText(`Collected: ${collectedCreatures.length} / 50`);

    // Show Popup
    if (popupTimer) popupTimer.remove();

    popupText.setText(`${battleText}You caught ${data.name}!\n\n${data.description || data.desc}`);
    popupBackground.setVisible(true);
    popupText.setVisible(true);

    popupTimer = this.time.delayedCall(3000, () => {
        popupBackground.setVisible(false);
        popupText.setVisible(false);
    });

    // Despawn
    creatureSprite.destroy();

    // Remove dynamic state properties like instance specific ID before respawning
    // so it acts like a clean base creature
    const respawnData = JSON.parse(JSON.stringify(data));
    delete respawnData.nature;

    // Respawn an exact copy of the creature immediately to keep the 50 in world
    spawnCreature(this, respawnData);
}

function update() {
    const speed = 400;

    // Animate background
    const frame = Math.floor(this.time.now / 300) % 4;
    bgGrass.setTexture('grass_' + frame);

    player.body.setVelocity(0);

    // Keyboard movement
    let movedX = false;
    let movedY = false;

    if (cursors.left.isDown) {
        player.body.setVelocityX(-speed);
        movedX = true;
    } else if (cursors.right.isDown) {
        player.body.setVelocityX(speed);
        movedX = true;
    }

    if (cursors.up.isDown) {
        player.body.setVelocityY(-speed);
        movedY = true;
    } else if (cursors.down.isDown) {
        player.body.setVelocityY(speed);
        movedY = true;
    }

    // Pointer movement (if active and overriding keyboard or not moving via keyboard)
    if (pointerTarget) {
        const dx = pointerTarget.x - player.x;
        const dy = pointerTarget.y - player.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 10) {
            player.body.setVelocity((dx / distance) * speed, (dy / distance) * speed);
        } else {
            // Reached target
            player.body.setVelocity(0);
        }
    } else if (!movedX && !movedY) {
        player.body.setVelocity(0);
    }
}
</script>
